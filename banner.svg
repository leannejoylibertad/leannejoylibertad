<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E84B1A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8722A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4A460;stop-opacity:1" />
    </linearGradient>

    <!-- Network dot pattern -->
    <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="2" fill="rgba(30,20,80,0.18)" />
    </pattern>

    <!-- Subtle noise overlay -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="860" height="200" fill="url(#bgGrad)" rx="10"/>

  <!-- Dot overlay pattern -->
  <rect width="860" height="200" fill="url(#dots)" rx="10" opacity="0.6"/>

  <!-- Network lines (left side) -->
  <g stroke="rgba(30,20,80,0.20)" stroke-width="1">
    <line x1="0" y1="40" x2="80" y2="100"/>
    <line x1="80" y1="100" x2="30" y2="160"/>
    <line x1="80" y1="100" x2="150" y2="60"/>
    <line x1="150" y1="60" x2="200" y2="130"/>
    <line x1="30" y1="160" x2="120" y2="190"/>
    <line x1="0" y1="110" x2="80" y2="100"/>
    <line x1="150" y1="60" x2="100" y2="10"/>
    <line x1="200" y1="130" x2="160" y2="195"/>
  </g>

  <!-- Network dots (left) -->
  <g fill="rgba(30,20,80,0.30)">
    <circle cx="80" cy="100" r="4"/>
    <circle cx="150" cy="60" r="4"/>
    <circle cx="30" cy="160" r="3"/>
    <circle cx="200" cy="130" r="3"/>
    <circle cx="100" cy="10" r="3"/>
    <circle cx="0" cy="40" r="3"/>
    <circle cx="120" cy="190" r="3"/>
  </g>

  <!-- Network lines (right side - geometric squares) -->
  <g stroke="rgba(30,20,80,0.18)" stroke-width="1" fill="none">
    <rect x="720" y="20" width="50" height="50" rx="4"/>
    <rect x="740" y="40" width="50" height="50" rx="4"/>
    <rect x="790" y="10" width="35" height="35" rx="3"/>
    <rect x="800" y="120" width="45" height="45" rx="4"/>
    <rect x="820" y="140" width="30" height="30" rx="3"/>
  </g>

  <!-- Network lines (right) -->
  <g stroke="rgba(30,20,80,0.18)" stroke-width="1">
    <line x1="680" y1="30" x2="760" y2="90"/>
    <line x1="760" y1="90" x2="830" y2="50"/>
    <line x1="760" y1="90" x2="800" y2="160"/>
    <line x1="830" y1="50" x2="860" y2="110"/>
    <line x1="680" y1="160" x2="760" y2="90"/>
  </g>
  <g fill="rgba(30,20,80,0.28)">
    <circle cx="760" cy="90" r="4"/>
    <circle cx="830" cy="50" r="3"/>
    <circle cx="680" cy="30" r="3"/>
    <circle cx="800" cy="160" r="3"/>
    <circle cx="680" cy="160" r="3"/>
  </g>

  <!-- Main Name Text -->
  <text
    x="430"
    y="100"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="58"
    font-weight="bold"
    fill="#1A1464"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-1"
  >Leanne Joy Libertad</text>

  <!-- Subtitle -->
  <text
    x="430"
    y="148"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="16"
    font-weight="400"
    fill="#2C1F6B"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="0.5"
  >Future Data Analyst  |  Business Analytics  |  Information Systems</text>

</svg>
